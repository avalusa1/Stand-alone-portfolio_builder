<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#FCE4EC"/>
  
  <!-- Hair (long wavy) -->
  <path d="M 65 60 Q 60 100 65 140 Q 100 155 135 140 Q 140 100 135 60 Q 100 45 65 60 Z" fill="#8B4513"/>
  
  <!-- Head -->
  <circle cx="100" cy="95" r="38" fill="#FDBCB4"/>
  
  <!-- Ears -->
  <ellipse cx="62" cy="90" rx="11" ry="22" fill="#FDBCB4"/>
  <ellipse cx="138" cy="90" rx="11" ry="22" fill="#FDBCB4"/>
  
  <!-- Eyes (larger, feminine) -->
  <ellipse cx="82" cy="82" rx="7" ry="10" fill="#333333"/>
  <ellipse cx="118" cy="82" rx="7" ry="10" fill="#333333"/>
  <circle cx="83" cy="80" r="3" fill="white"/>
  <circle cx="119" cy="80" r="3" fill="white"/>
  
  <!-- Eyebrows (curved) -->
  <path d="M 72 72 Q 82 68 92 72" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 108 72 Q 118 68 128 72" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Eyelashes -->
  <path d="M 80 92 Q 80 97 82 100 M 85 92 Q 85 97 86 100" stroke="#333333" stroke-width="1"/>
  <path d="M 116 92 Q 116 97 118 100 M 121 92 Q 121 97 122 100" stroke="#333333" stroke-width="1"/>
  
  <!-- Nose -->
  <line x1="100" y1="85" x2="100" y2="100" stroke="#E8A399" stroke-width="1.5"/>
  
  <!-- Blush -->
  <circle cx="70" cy="105" r="8" fill="#FFB6C1" opacity="0.6"/>
  <circle cx="130" cy="105" r="8" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- Mouth (smile) -->
  <path d="M 82 115 Q 100 127 118 115" stroke="#E75480" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Neck -->
  <rect x="86" y="128" width="28" height="17" fill="#FDBCB4"/>
  
  <!-- Body -->
  <path d="M 68 145 L 60 190 Q 100 200 140 190 L 132 145 Z" fill="#FF69B4"/>
  
  <!-- Dress detail -->
  <circle cx="100" cy="160" r="12" fill="#FF1493" opacity="0.5"/>
</svg>