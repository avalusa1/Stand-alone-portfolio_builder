<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#FFE0B2"/>
  
  <!-- Hair (braids style) -->
  <path d="M 60 65 Q 100 50 140 65 Q 140 95 100 105 Q 60 95 60 65 Z" fill="#8B6F47"/>
  <!-- Left braid -->
  <path d="M 70 75 Q 65 95 68 120" stroke="#8B6F47" stroke-width="6" fill="none"/>
  <!-- Right braid -->
  <path d="M 130 75 Q 135 95 132 120" stroke="#8B6F47" stroke-width="6" fill="none"/>
  
  <!-- Head -->
  <circle cx="100" cy="100" r="38" fill="#FFB380"/>
  
  <!-- Ears -->
  <ellipse cx="60" cy="95" rx="11" ry="24" fill="#FFB380"/>
  <ellipse cx="140" cy="95" rx="11" ry="24" fill="#FFB380"/>
  
  <!-- Eyes (dreamy) -->
  <ellipse cx="80" cy="88" rx="6" ry="9" fill="#2C3E50"/>
  <ellipse cx="120" cy="88" rx="6" ry="9" fill="#2C3E50"/>
  <circle cx="81" cy="87" r="2" fill="white"/>
  <circle cx="121" cy="87" r="2" fill="white"/>
  
  <!-- Eyebrows (gentle) -->
  <path d="M 73 80 Q 80 77 87 80" stroke="#8B6F47" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 113 80 Q 120 77 127 80" stroke="#8B6F47" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <line x1="100" y1="90" x2="100" y2="103" stroke="#F5A06F" stroke-width="1.5"/>
  
  <!-- Freckles -->
  <circle cx="92" cy="105" r="1" fill="#8B6F47" opacity="0.6"/>
  <circle cx="108" cy="105" r="1" fill="#8B6F47" opacity="0.6"/>
  
  <!-- Blush (soft) -->
  <ellipse cx="68" cy="108" rx="9" ry="7" fill="#FFB6D9" opacity="0.6"/>
  <ellipse cx="132" cy="108" rx="9" ry="7" fill="#FFB6D9" opacity="0.6"/>
  
  <!-- Mouth (gentle smile) -->
  <path d="M 80 118 Q 100 127 120 118" stroke="#FF6B9D" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  
  <!-- Neck -->
  <rect x="88" y="135" width="24" height="15" fill="#FFB380"/>
  
  <!-- Body (purple top) -->
  <path d="M 70 150 L 62 190 Q 100 200 138 190 L 130 150 Z" fill="#DDA0DD"/>
  
  <!-- Flower in hair -->
  <circle cx="100" cy="55" r="5" fill="#FF69B4"/>
  <circle cx="96" cy="53" r="3" fill="#FF1493"/>
  <circle cx="104" cy="53" r="3" fill="#FF1493"/>
  <circle cx="99" cy="60" r="3" fill="#FF1493"/>
  <circle cx="101" cy="60" r="3" fill="#FF1493"/>
  <circle cx="100" cy="57" r="2" fill="#FFD700"/>
</svg>