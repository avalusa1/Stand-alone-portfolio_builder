<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#E0F2F1"/>
  
  <!-- Hair (curly/afro style) -->
  <circle cx="100" cy="55" r="35" fill="#3D2817"/>
  <circle cx="75" cy="70" r="15" fill="#3D2817"/>
  <circle cx="125" cy="70" r="15" fill="#3D2817"/>
  <circle cx="70" cy="95" r="14" fill="#3D2817"/>
  <circle cx="130" cy="95" r="14" fill="#3D2817"/>
  
  <!-- Head -->
  <circle cx="100" cy="100" r="38" fill="#D4A574"/>
  
  <!-- Ears -->
  <ellipse cx="60" cy="95" rx="12" ry="23" fill="#D4A574"/>
  <ellipse cx="140" cy="95" rx="12" ry="23" fill="#D4A574"/>
  
  <!-- Eyes (expressive) -->
  <ellipse cx="80" cy="88" rx="8" ry="11" fill="#1A1A1A"/>
  <ellipse cx="120" cy="88" rx="8" ry="11" fill="#1A1A1A"/>
  <circle cx="82" cy="85" r="3" fill="white"/>
  <circle cx="122" cy="85" r="3" fill="white"/>
  
  <!-- Eyebrows (bold) -->
  <path d="M 70 78 Q 80 74 90 78" stroke="#3D2817" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 110 78 Q 120 74 130 78" stroke="#3D2817" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose (wider) -->
  <ellipse cx="100" cy="98" rx="4" ry="6" fill="#C4956D"/>
  
  <!-- Blush -->
  <ellipse cx="65" cy="110" rx="11" ry="9" fill="#E6B89C" opacity="0.7"/>
  <ellipse cx="135" cy="110" rx="11" ry="9" fill="#E6B89C" opacity="0.7"/>
  
  <!-- Mouth (confident smile) -->
  <path d="M 78 120 Q 100 133 122 120" stroke="#8B4513" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Neck -->
  <rect x="88" y="135" width="24" height="16" fill="#D4A574"/>
  
  <!-- Body -->
  <path d="M 70 151 L 62 190 Q 100 200 138 190 L 130 151 Z" fill="#009688"/>
  
  <!-- Earrings -->
  <circle cx="58" cy="120" r="4" fill="#FFD700"/>
  <circle cx="142" cy="120" r="4" fill="#FFD700"/>
</svg>