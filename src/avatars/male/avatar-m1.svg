<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#E3F2FD"/>
  
  <!-- Hair -->
  <ellipse cx="100" cy="60" rx="45" ry="50" fill="#2C3E50"/>
  
  <!-- Head -->
  <circle cx="100" cy="90" r="40" fill="#F4A460"/>
  
  <!-- Ears -->
  <ellipse cx="60" cy="85" rx="12" ry="25" fill="#F4A460"/>
  <ellipse cx="140" cy="85" rx="12" ry="25" fill="#F4A460"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="80" r="5" fill="#2C3E50"/>
  <circle cx="115" cy="80" r="5" fill="#2C3E50"/>
  
  <!-- Eyebrows -->
  <path d="M 78 72 Q 85 70 92 72" stroke="#2C3E50" stroke-width="2" fill="none"/>
  <path d="M 108 72 Q 115 70 122 72" stroke="#2C3E50" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <path d="M 100 80 L 100 95" stroke="#D4A574" stroke-width="1.5" fill="none"/>
  
  <!-- Mouth -->
  <path d="M 85 105 Q 100 115 115 105" stroke="#2C3E50" stroke-width="2" fill="none"/>
  
  <!-- Neck -->
  <rect x="85" y="125" width="30" height="20" fill="#F4A460"/>
  
  <!-- Body/Shirt -->
  <path d="M 70 145 L 65 180 Q 100 195 135 180 L 130 145 Z" fill="#3498DB"/>
  
  <!-- Shoulders detail -->
  <ellipse cx="75" cy="145" rx="8" ry="12" fill="#2980B9"/>
  <ellipse cx="125" cy="145" rx="8" ry="12" fill="#2980B9"/>
