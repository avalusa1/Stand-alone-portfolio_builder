<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#E8F5E9"/>
  
  <!-- Hair (slicked back) -->
  <path d="M 60 60 L 140 60 Q 145 75 100 95 Q 55 75 60 60 Z" fill="#4A4A4A"/>
  
  <!-- Head -->
  <circle cx="100" cy="100" r="40" fill="#FDBCB4"/>
  
  <!-- Ears -->
  <circle cx="58" cy="95" r="13" fill="#FDBCB4"/>
  <circle cx="142" cy="95" r="13" fill="#FDBCB4"/>
  
  <!-- Eyes (serious look) -->
  <rect x="78" y="82" width="12" height="14" rx="2" fill="#333333"/>
  <rect x="110" y="82" width="12" height="14" rx="2" fill="#333333"/>
  <circle cx="84" cy="88" r="1.5" fill="white"/>
  <circle cx="116" cy="88" r="1.5" fill="white"/>
  
  <!-- Eyebrows (straight, serious) -->
  <line x1="75" y1="80" x2="92" y2="80" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="108" y1="80" x2="125" y2="80" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Nose -->
  <line x1="100" y1="92" x2="100" y2="108" stroke="#E8A399" stroke-width="2"/>
  
  <!-- Mouth (neutral) -->
  <line x1="85" y1="118" x2="115" y2="118" stroke="#C9756F" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Facial hair (stubble effect) -->
  <circle cx="82" cy="125" r="0.8" fill="#8B7355" opacity="0.6"/>
  <circle cx="100" cy="128" r="0.8" fill="#8B7355" opacity="0.6"/>
  <circle cx="118" cy="125" r="0.8" fill="#8B7355" opacity="0.6"/>
  
  <!-- Neck -->
  <rect x="88" y="135" width="24" height="15" fill="#FDBCB4"/>
  
  <!-- Body (suit-like) -->
  <path d="M 70 150 L 62 190 Q 100 200 138 190 L 130 150 Z" fill="#2C2C2C"/>
  
  <!-- Tie -->
  <path d="M 98 150 L 92 175 L 100 170 L 108 175 Z" fill="#DC143C"/>
</svg>