<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#F3E5F5"/>
  
  <!-- Hair (wavy style) -->
  <path d="M 60 70 Q 60 40 100 35 Q 140 40 140 70 Q 130 85 100 90 Q 70 85 60 70 Z" fill="#1A1A1A"/>
  
  <!-- Head -->
  <circle cx="100" cy="100" r="40" fill="#FDBCB4"/>
  
  <!-- Ears -->
  <ellipse cx="58" cy="95" rx="12" ry="24" fill="#FDBCB4"/>
  <ellipse cx="142" cy="95" rx="12" ry="24" fill="#FDBCB4"/>
  
  <!-- Eyes -->
  <circle cx="82" cy="88" r="6" fill="#333333"/>
  <circle cx="118" cy="88" r="6" fill="#333333"/>
  <circle cx="84" cy="86" r="2" fill="white"/>
  <circle cx="120" cy="86" r="2" fill="white"/>
  
  <!-- Eyebrows -->
  <path d="M 75 80 Q 82 77 89 80" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 111 80 Q 118 77 125 80" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <line x1="100" y1="90" x2="100" y2="105" stroke="#E8A399" stroke-width="2"/>
  
  <!-- Mouth -->
  <path d="M 82 115 Q 100 125 118 115" stroke="#C9756F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Neck -->
  <rect x="88" y="135" width="24" height="15" fill="#FDBCB4"/>
  
  <!-- Body -->
  <path d="M 72 150 L 65 190 Q 100 200 135 190 L 128 150 Z" fill="#FF6B6B"/>
  
  <!-- Shirt texture -->
  <circle cx="100" cy="165" r="6" fill="#FF5252" opacity="0.5"/>
</svg>