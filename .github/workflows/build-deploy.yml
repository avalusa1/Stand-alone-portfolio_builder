name: Build & Deploy Portfolio

on:
  push:
    branches:
      - main
    paths:
      - 'portfolio.config.json'
      - 'src/**'
      - 'package.json'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Validate Config
        run: npm run validate-config

      - name: Generate Portfolio Data
        run: npm run generate-config

      - name: Process Avatar
        run: npm run process-avatar
        continue-on-error: true

      - name: Build Project
        run: npm run build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Success Notification
        run: |
          echo "Portfolio built and deployed successfully!"
          echo "Live at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"